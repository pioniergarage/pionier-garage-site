name: Deploy to Main

on:
  workflow_dispatch:
    inputs:
      payload:
        description: Pages CMS payload as JSON
        required: true
        type: string

jobs:
  merge-branch:
    runs-on: ubuntu-latest
    steps:
      # 1. Generate a temporary, high-privilege installation token using your GitHub App
      - name: Generate GitHub App Token
        id: generate-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      # 2. Checkout the repository using the App's token
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 
          token: ${{ steps.generate-token.outputs.token }}

      # 3. Configure Git credentials using the App's identity
      - name: Configure Git User
        run: |
          git config --global user.name "pioniergarage-merge-bot[bot]"
          git config --global user.email "pioniergarage-merge-bot[bot]@users.noreply.github.com"

      # 4. Merge and push directly to main
      - name: Merge work into main
        run: |
          git checkout main
          git merge origin/work --no-ff -m "Automated merge from 'work' branch via GitHub App"
          git push origin main