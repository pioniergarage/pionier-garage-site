<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Printable Grid</title>
    <style>
      /* ADJUST YOUR GRID HERE */
      :root {
        --rows: 8; /* Set number of rows */
        --cols: 1; /* Set number of columns */
        --padding: 1em;
      }

      /* Page Setup */
      @page {
        size: A4;
        margin: 0; /* Handled by body padding for better control */
      }

      body {
        margin: 0;
        padding: var(--padding);
        box-sizing: border-box;
        height: 100vh;
        width: 100vw;
        display: flex;
        flex-direction: column;
      }

      /* The Grid Container */
      .grid-container {
        display: grid;
        flex-grow: 1; /* Ensures the grid fills the A4 page */
        gap: 1em; /* Adjust if you want space between cells */

        /* Logic for rows and columns */
        grid-template-rows: repeat(var(--rows), 1fr);
        grid-template-columns: repeat(var(--cols), 1fr);
      }

      /* The Grid Cells */
      .grid-item {
        outline: 2px solid black;
        border-radius: 1em;
        /* Using outline instead of border prevents 
               double-thickness lines between adjacent cells */
      }

      /* Screen-only styling to visualize the A4 page */
      @media screen {
        body {
          background-color: white;
        }
        body {
          display: block;
          height: auto;
        }
        .grid-container {
          width: 210mm;
          height: 297mm;
          margin: 20px auto;
        }
      }
    </style>
  </head>
  <body>
    <div class="grid-container" id="grid"></div>

    <script>
      const grid = document.getElementById("grid");
      const rows = getComputedStyle(document.documentElement).getPropertyValue(
        "--rows",
      );
      const cols = getComputedStyle(document.documentElement).getPropertyValue(
        "--cols",
      );
      const totalCells = parseInt(rows) * parseInt(cols);

      for (let i = 0; i < totalCells; i++) {
        const div = document.createElement("div");
        div.className = "grid-item";
        grid.appendChild(div);
      }
    </script>
  </body>
</html>
